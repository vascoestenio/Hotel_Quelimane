<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Clientes</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{

    min-height:100vh;

    background:
    linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.65)),
    url('https://images.unsplash.com/photo-1551882547-ff40c63fe5fa');

    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

.area{

    margin-top:40px;

    background:rgba(255,255,255,.10);

    backdrop-filter:blur(15px);

    border-radius:25px;

    padding:30px;

    box-shadow:0 10px 35px rgba(0,0,0,.4);

    animation:fade 1s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.titulo{
    color:white;
    text-align:center;
    margin-bottom:25px;
}

.titulo i{
    color:#FFD700;
    font-size:45px;
}

.table{

    background:rgba(255,255,255,.92);

    border-radius:15px;

    overflow:hidden;
}

thead{
    background:#FFD700;
}

.btn{
    border-radius:25px;
}

</style>

</head>
<body>

<div class="container">

<div class="area">

    <div class="titulo">
        <i class="fas fa-users"></i>
        <h2>Gestão de Clientes</h2>
        <p>Hotel Quelimane Premium</p>
    </div>

    <a th:href="@{/dashboard}" class="btn btn-secondary mb-3">
        <i class="fas fa-home"></i> Voltar
    </a>

    <a th:href="@{/clientes/novo}" class="btn btn-success mb-3">
        <i class="fas fa-plus"></i> Novo Cliente
    </a>

    <table class="table table-bordered table-hover">

        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Documento</th>
                <th>Telefone</th>
                <th>Email</th>
                <th>Ações</th>
            </tr>
        </thead>

        <tbody>

            <tr th:each="cliente : ${clientes}">

                <td th:text="${cliente.id}"></td>
                <td th:text="${cliente.nome}"></td>
                <td th:text="${cliente.documento}"></td>
                <td th:text="${cliente.telefone}"></td>
                <td th:text="${cliente.email}"></td>

                <td>

                    <a th:href="@{/clientes/editar/{id}(id=${cliente.id})}"
                       class="btn btn-warning btn-sm">
                        <i class="fas fa-edit"></i>
                        Editar
                    </a>

                    <a th:href="@{/clientes/eliminar/{id}(id=${cliente.id})}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Eliminar cliente?')">

                        <i class="fas fa-trash"></i>
                        Remover

                    </a>

                </td>

            </tr>

        </tbody>

    </table>

</div>

</div>

</body>
</html>
