<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard - Hotel Engenheiros</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ===== BASE ===== */
body{
    margin:0;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;

    background:
        linear-gradient(rgba(5,15,35,0.75), rgba(10,20,40,0.75)),
        url('/imagens/hotel.jpg');

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;

    color:white;
    overflow-x:hidden;
}

/* ===== LAYOUT ===== */
.dashboard{
    display:flex;
    min-height:100vh;
}

/* ===== MAIN ===== */
.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

/* ===== HEADER ===== */
.header{
    background:rgba(0,0,0,0.6);
    padding:15px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    backdrop-filter:blur(8px);
}

.header h2{
    margin:0;
    font-size:20px;
}

/* ===== BOTÃO ===== */
.btn-voltar-login{
    padding:8px 15px;
    background:#dc3545;
    color:white;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

/* ===== SIDEBAR ===== */
.sidebar{
    width:260px;
    background:rgba(20,20,20,0.85);
    display:flex;
    flex-direction:column;
    padding:20px;
    gap:10px;
    backdrop-filter:blur(10px);
}

.sidebar h3{
    margin-bottom:10px;
}

.sidebar a{
    color:white;
    text-decoration:none;
    padding:10px;
    background:rgba(255,255,255,0.08);
    border-radius:8px;
    transition:0.3s;
    display:flex;
    gap:10px;
    align-items:center;
}

.sidebar a:hover{
    background:#0d6efd;
    transform:translateX(5px);
}

/* ===== CONTENT (SÓ IMAGEM) ===== */
.content{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* RESPONSIVO */
@media(max-width:768px){

    .sidebar{
        position:fixed;
        right:-260px;
        top:0;
        height:100%;
        transition:0.3s;
        z-index:999;
    }

    .sidebar.active{
        right:0;
    }

}

</style>
</head>

<body>

<div class="dashboard">

    <!-- MAIN -->
    <div class="main">

        <!-- HEADER -->
        <div class="header">

            <h2>Hotel Engenheiros - Sistema de Gestão</h2>

            <a href="/login" class="btn-voltar-login">
                ← Voltar
            </a>

        </div>

        <!-- CONTENT (FICOU LIMPO) -->
        <div class="content">
            <!-- Aqui só aparece o fundo (imagem do hotel) -->
        </div>

    </div>

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <h3>Menu</h3>

        <a th:href="@{/clientes}"><i class="fa fa-users"></i> Clientes</a>
        <a th:href="@{/quartos}"><i class="fa fa-bed"></i> Quartos</a>
        <a th:href="@{/reservas}"><i class="fa fa-calendar"></i> Reservas</a>
        <a th:href="@{/pagamentos}"><i class="fa fa-credit-card"></i> Pagamentos</a>
        <a th:href="@{/recibos}"><i class="fa fa-file"></i> Recibos</a>

        <div sec:authorize="hasAnyRole('ADMIN','GERENTE')">
            <a th:href="@{/relatorios/financeiro}">
                <i class="fa fa-chart-line"></i> Relatórios
            </a>
        </div>

        <div sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/usuarios}" style="background:#ffc107;color:black;">
                <i class="fa fa-user"></i> Utilizadores
            </a>
        </div>

    </aside>

</div>

<!-- JS SIDEBAR (OPCIONAL) -->
<script>
function toggleMenu(){
    document.querySelector('.sidebar').classList.toggle('active');
}
</script>

</body>
</html>
