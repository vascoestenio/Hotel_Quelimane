<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Reservas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
    min-height:100vh;

    background:
    linear-gradient(rgba(0,0,0,.70),rgba(0,0,0,.70)),
    url('https://images.unsplash.com/photo-1542314831-068cd1dbfeeb');

    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

.area{
    margin-top:30px;

    background:rgba(255,255,255,.12);

    backdrop-filter:blur(15px);

    border-radius:25px;

    padding:30px;

    box-shadow:0 15px 40px rgba(0,0,0,.4);

    animation:fadeIn .8s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.titulo{
    text-align:center;
    color:white;
    margin-bottom:20px;
}

.titulo i{
    font-size:45px;
    color:#FFD700;
}

.table{
    background:white;
    border-radius:15px;
    overflow:hidden;
}

thead{
    background:#212529;
    color:white;
}

.btn{
    border-radius:25px;
}

.status{
    font-weight:bold;
    padding:5px 10px;
    border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="area">

<div class="titulo">
    <i class="fas fa-calendar-check"></i>
    <h2>Gestão de Reservas</h2>
    <p>HOTEL DE QUELIMANE DE 05 ESTRELAS</p>
</div>

<a th:href="@{/dashboard}" class="btn btn-secondary mb-3">
    <i class="fas fa-home"></i> Voltar
</a>

<a th:href="@{/reservas/novo}" class="btn btn-success mb-3">
    <i class="fas fa-plus"></i> Nova Reserva
</a>

<table class="table table-bordered table-hover">

<thead>
<tr>
    <th>ID</th>
    <th>Cliente</th>
    <th>Quarto</th>
    <th>Entrada</th>
    <th>Saída</th>
    <th>Total</th>
    <th>Status</th>
    <th>Ações</th>
</tr>
</thead>

<tbody>

<tr th:each="r : ${reservas}">

    <td th:text="${r.id}"></td>

    <td th:text="${r.cliente != null ? r.cliente.nome : 'N/A'}"></td>

    <td th:text="${r.quarto != null ? r.quarto.numero : 'N/A'}"></td>

    <td th:text="${r.dataEntrada}"></td>

    <td th:text="${r.dataSaida}"></td>

    <td th:text="${r.valorTotal}"></td>

    <td>
        <span class="status"
              th:text="${r.status}"></span>
    </td>

    <td>

        <a th:href="@{/reservas/editar/{id}(id=${r.id})}"
           class="btn btn-success btn-sm">
            <i class="fas fa-edit"></i> Editar
        </a>

        <a th:href="@{/reservas/checkin/{id}(id=${r.id})}"
           class="btn btn-primary btn-sm">
            Check-in
        </a>

        <a th:href="@{/reservas/checkout/{id}(id=${r.id})}"
           class="btn btn-warning btn-sm">
            Check-out
        </a>

        <a th:href="@{/reservas/cancelar/{id}(id=${r.id})}"
           class="btn btn-secondary btn-sm">
            Cancelar
        </a>

        <a th:href="@{/reservas/remover/{id}(id=${r.id})}"
           class="btn btn-danger btn-sm"
           onclick="return confirm('Eliminar reserva?')">
            Remover
        </a>

    </td>

</tr>

</tbody>

</table>

</div>

</div>

</body>
</html>
