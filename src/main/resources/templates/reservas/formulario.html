<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Formulário de Reserva</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{

    min-height:100vh;

    display:flex;
    align-items:center;
    justify-content:center;

    background:
    linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.65)),
    url('https://images.unsplash.com/photo-1542314831-068cd1dbfeeb');

    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

.card-form{

    width:600px;

    background:rgba(255,255,255,.12);

    backdrop-filter:blur(15px);

    border-radius:25px;

    padding:30px;

    box-shadow:0 15px 40px rgba(0,0,0,.4);

    animation:fadeIn .8s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h2{
    text-align:center;
    color:white;
    margin-bottom:20px;
}

label{
    color:white;
    font-weight:bold;
}

.form-control,
.form-select{
    border-radius:12px;
    border:none;
}

.form-control:focus,
.form-select:focus{
    box-shadow:0 0 15px gold;
}

.btn{
    border-radius:25px;
}

</style>

</head>

<body>

<div class="card-form">

<h2>
<i class="fas fa-calendar-plus"></i>
Formulário de Reserva
</h2>

<form th:action="@{${id != null} ? '/reservas/atualizar/' + ${id} : '/reservas/salvar'}"
      th:object="${reserva}"
      method="post">

    <!-- CLIENTE -->
    <div class="mb-3">
        <label>Cliente</label>
        <select class="form-select"
                th:field="*{clienteId}"
                required>

            <option value="">Selecione um Cliente</option>

            <option th:each="cliente : ${clientes}"
                    th:value="${cliente.id}"
                    th:text="${cliente.nome}">
            </option>

        </select>
    </div>

    <!-- QUARTO -->
    <div class="mb-3">
        <label>Quarto</label>
        <select class="form-select"
                th:field="*{quartoId}"
                required>

            <option value="">Selecione um Quarto</option>

            <option th:each="quarto : ${quartos}"
                    th:value="${quarto.id}"
                    th:text="'Quarto Nº ' + ${quarto.numero}">
            </option>

        </select>
    </div>

    <!-- DATA ENTRADA -->
    <div class="mb-3">
        <label>Data de Entrada</label>
        <input type="date"
               class="form-control"
               th:field="*{dataEntrada}"
               required>
    </div>
    <div class="mb-3">
        <label>Data de Saída</label>
        <input type="date"
               class="form-control"
               th:field="*{dataSaida}"
               required>
    </div>

    <button type="submit" class="btn btn-success w-100">
        <i class="fas fa-save"></i> Guardar
    </button>

    <a th:href="@{/reservas}" class="btn btn-secondary w-100 mt-2">
        Cancelar
    </a>

    <a th:href="@{/dashboard}" class="btn btn-dark w-100 mt-2">
        Dashboard
    </a>

</form>

</div>

</body>
</html>
