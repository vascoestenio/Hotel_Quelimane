<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Relatório Financeiro - Hotel Engenheiros</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<style>

body{
    background:
    linear-gradient(
        rgba(248,249,250,0.85),
        rgba(248,249,250,0.85)
    ),
    url('https://images.unsplash.com/photo-1551882547-ff40c63fe5fa');

    background-size: cover;
    background-position: center;
    background-attachment: fixed;

    font-family: Arial, sans-serif;
    color: #212529;
}

.container{
    padding-top: 30px;
    padding-bottom: 50px;
}

/* ANIMAÇÃO */
.fade-in{
    animation: fadeIn 1s ease-in-out;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* CARDS */
.card{
    border-radius:15px;
    border:none;
    transition:0.3s;
    overflow:hidden;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

/* GLASS EFFECT MELHORADO */
.glass{
    background:rgba(255,255,255,0.95);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,0.4);

    border-radius:15px;
    padding:20px;

    box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

/* ICONES */
.icon{
    font-size:30px;
    margin-bottom:10px;
}

/* HEADER */
.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    font-weight:bold;
    color:#0d6efd;
    text-shadow:1px 1px 3px rgba(0,0,0,0.1);
}

.header p{
    color:#495057;
    font-size:16px;
    font-weight:500;
}

/* TITULOS DOS CARDS */
.card h5{
    color:#495057;
    font-weight:600;
    margin-bottom:10px;
}

/* VALORES */
.card h2{
    color:#212529;
    font-weight:bold;
}

/* CANVAS DOS GRÁFICOS */
canvas{
    max-height:280px;
}

/* RESPONSIVO */
@media(max-width:768px){

    .header h1{
        font-size:28px;
    }

    .card h2{
        font-size:24px;
    }

    .icon{
        font-size:26px;
    }
}

</style>
<style>
/* ===== BOTÃO VOLTAR PREMIUM ===== */
.back-btn {
    position: fixed;
    top: 20px;
    left: 20px;

    display: flex;
    align-items: center;
    gap: 8px;

    padding: 12px 18px;
    border-radius: 30px;

    background: linear-gradient(45deg, #1f4037, #99f2c8);
    color: white;
    text-decoration: none;

    font-weight: bold;
    font-family: 'Segoe UI', sans-serif;

    box-shadow: 0 8px 25px rgba(0,0,0,0.3);

    transition: all 0.4s ease;
    animation: slideInLeft 0.8s ease;
}

/* efeito hover */
.back-btn:hover {
    transform: translateX(-5px) scale(1.05);
    box-shadow: 0 12px 35px rgba(0,0,0,0.4);
}

/* seta animada */
.back-btn span {
    display: inline-block;
    transition: transform 0.3s ease;
}

.back-btn:hover span {
    transform: translateX(-5px);
}

/* animação entrada */
@keyframes slideInLeft {
    from {
        opacity: 0;
        transform: translateX(-40px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}
</style>

</head>

<body>
	<a href="/dashboard" class="back-btn">
	    <span>⬅</span> Voltar
	</a>

<div class="container fade-in">

    <!-- HEADER -->
    <div class="header">
        <h1><i class="fas fa-chart-line"></i> Relatório Financeiro</h1>
        <p>Hotel Engenheiros - Sistema de Gestão</p>
    </div>

    <!-- =======================
         CARDS FINANCEIROS
    ======================== -->
    <div class="row g-4">

        <div class="col-md-4">
            <div class="card glass text-center p-3">
                <i class="fas fa-coins icon text-warning"></i>
                <h5>Receita Total</h5>
                <h2 th:text="${receitaTotal} + ' MT'">0</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card glass text-center p-3">
                <i class="fas fa-sack-dollar icon text-success"></i>
                <h5>Receita Hoje</h5>
                <h2 th:text="${receitaHoje} + ' MT'">0</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card glass text-center p-3">
                <i class="fas fa-money-bill-wave icon text-info"></i>
                <h5>Total Pagamentos</h5>
                <h2 th:text="${totalPagamentos}">0</h2>
            </div>
        </div>

    </div>

    <!-- =======================
         ESTATÍSTICAS GERAIS
    ======================== -->
    <div class="row g-4 mt-4">

        <div class="col-md-4">
            <div class="card glass text-center p-3">
                <i class="fas fa-users icon text-primary"></i>
                <h5>Clientes</h5>
                <h2 th:text="${totalClientes}">0</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card glass text-center p-3">
                <i class="fas fa-calendar-check icon text-warning"></i>
                <h5>Reservas</h5>
                <h2 th:text="${totalReservas}">0</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card glass text-center p-3">
                <i class="fas fa-bed icon text-success"></i>
                <h5>Quartos</h5>
                <h2 th:text="${totalQuartos}">0</h2>
            </div>
        </div>

    </div>

    <!-- =======================
         GRÁFICOS
    ======================== -->
    <div class="row mt-5">

        <div class="col-md-4">
            <div class="card glass p-3">
                <h5 class="text-center">Métodos de Pagamento</h5>
                <canvas id="metodoChart"></canvas>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card glass p-3">
                <h5 class="text-center">Top Clientes</h5>
                <canvas id="clientesChart"></canvas>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card glass p-3">
                <h5 class="text-center">Quartos Rentáveis</h5>
                <canvas id="quartosChart"></canvas>
            </div>
        </div>

    </div>

</div>

<!-- =======================
     CHART JS
======================= -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script th:inline="javascript">

const metodos = /*[[${metodos}]]*/ [];
const clientes = /*[[${clientes}]]*/ [];
const quartos = /*[[${quartos}]]*/ [];

/* MÉTODOS */
new Chart(document.getElementById('metodoChart'), {
    type: 'pie',
    data: {
        labels: metodos.map(m => m[0]),
        datasets: [{
            data: metodos.map(m => m[1]),
            backgroundColor: ['#20c997','#0d6efd','#ffc107','#dc3545','#6610f2']
        }]
    }
});

/* CLIENTES */
new Chart(document.getElementById('clientesChart'), {
    type: 'bar',
    data: {
        labels: clientes.map(c => c[0]),
        datasets: [{
            label: 'MT',
            data: clientes.map(c => c[1]),
            backgroundColor: '#0d6efd'
        }]
    }
});

/* QUARTOS */
new Chart(document.getElementById('quartosChart'), {
    type: 'bar',
    data: {
        labels: quartos.map(q => q[0]),
        datasets: [{
            label: 'MT',
            data: quartos.map(q => q[1]),
            backgroundColor: '#20c997'
        }]
    }
});

</script>

</body>
</html>
