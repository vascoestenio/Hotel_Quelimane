<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard - Hotel Engenheiros</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ===== BASE (FUNDO PREMIUM) ===== */
body{
    margin:0;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;

    background:
        linear-gradient(rgba(5,15,35,0.75), rgba(10,20,40,0.75)),
        url('/imagens/hotel.jpg');

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;

    color:white;
    overflow-x:hidden;
}

/* ===== DASHBOARD LAYOUT ===== */
.dashboard{
    display:flex;
    min-height:100vh;
}

/* ===== MAIN ===== */
.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

/* ===== HEADER PREMIUM ===== */
.header{
    background:rgba(0,0,0,0.55);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);

    padding:15px 25px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    border-bottom:1px solid rgba(255,255,255,0.1);

    animation:fadeDown .6s ease;
}

.header h2{
    margin:0;
    font-size:20px;
    letter-spacing:1px;
}

/* BOTÃO */
.btn-voltar-login{
    padding:8px 15px;
    background:#dc3545;
    color:white;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.btn-voltar-login:hover{
    transform:scale(1.05);
}

/* ===== SIDEBAR PREMIUM ===== */
.sidebar{
    width:260px;

    background:rgba(15,15,20,0.85);
    backdrop-filter:blur(14px);

    display:flex;
    flex-direction:column;

    padding:20px;
    gap:10px;

    border-left:1px solid rgba(255,255,255,0.08);

    animation:fadeLeft .6s ease;
}

.sidebar h3{
    margin-bottom:10px;
}

.sidebar a{
    color:white;
    text-decoration:none;

    padding:12px;

    background:rgba(255,255,255,0.08);

    border-radius:10px;

    display:flex;
    gap:10px;
    align-items:center;

    transition:0.3s;
}

.sidebar a:hover{
    background:#0d6efd;
    transform:translateX(-6px);
    box-shadow:0 5px 15px rgba(13,110,253,0.4);
}

/* ===== CONTENT (SÓ FUNDO) ===== */
.content{
    flex:1;
}

/* ===== ANIMAÇÕES PREMIUM ===== */
@keyframes fadeDown{
    from{opacity:0; transform:translateY(-20px);}
    to{opacity:1; transform:translateY(0);}
}

@keyframes fadeLeft{
    from{opacity:0; transform:translateX(20px);}
    to{opacity:1; transform:translateX(0);}
}

/* RESPONSIVO */
@media(max-width:768px){

    .sidebar{
        position:fixed;
        right:-260px;
        top:0;
        height:100%;
        transition:0.3s;
        z-index:999;
    }

    .sidebar.active{
        right:0;
    }

}

</style>
</head>

<body>

<div class="dashboard">

    <!-- MAIN -->
    <div class="main">

        <!-- HEADER -->
        <div class="header">

            <h2>Hotel Engenheiros | Sistema de Gestão</h2>

            <a href="/login" class="btn-voltar-login">← Voltar</a>

        </div>

        <!-- CONTENT (SÓ FUNDO) -->
        <div class="content"></div>

    </div>

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <h3>Menu</h3>

        <a th:href="@{/clientes}"><i class="fa fa-users"></i> Clientes</a>
        <a th:href="@{/quartos}"><i class="fa fa-bed"></i> Quartos</a>
        <a th:href="@{/reservas}"><i class="fa fa-calendar"></i> Reservas</a>
        <a th:href="@{/pagamentos}"><i class="fa fa-credit-card"></i> Pagamentos</a>
        <a th:href="@{/recibos}"><i class="fa fa-file"></i> Recibos</a>

        <div sec:authorize="hasAnyRole('ADMIN','GERENTE')">
            <a th:href="@{/relatorios/financeiro}">
                <i class="fa fa-chart-line"></i> Relatórios
            </a>
        </div>

        <div sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/usuarios}" style="background:#ffc107;color:black;">
                <i class="fa fa-user"></i> Utilizadores
            </a>
        </div>

    </aside>

</div>

</body>
</html>
