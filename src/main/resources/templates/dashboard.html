<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>      HOTEL DOS ESTUDANTES DE CURSO DE MESTRADO PELA FCSP -QUELIMANE</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ================== BASE SAAS ================== */
body{
    margin:0;
    font-family:Inter, "Segoe UI", sans-serif;

    background:
        linear-gradient(120deg, rgba(10,15,35,0.75), rgba(0,0,0,0.75)),
        url('/imagens/hotel.jpg');

    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    color:white;
    overflow-x:hidden;
}

/* ================== LAYOUT ================== */
.dashboard{
    display:flex;
    min-height:100vh;
}

/* ================== SIDEBAR SAAS ================== */
.sidebar{
    width:270px;

    background:rgba(20,20,28,0.75);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    border-right:1px solid rgba(255,255,255,0.08);

    padding:20px;

    display:flex;
    flex-direction:column;
    gap:12px;

    animation:slideInLeft .6s ease;
}

.sidebar h3{
    font-size:14px;
    letter-spacing:2px;
    text-transform:uppercase;
    opacity:0.6;
}

.sidebar a{
    display:flex;
    align-items:center;
    gap:10px;

    padding:12px 14px;

    border-radius:12px;

    color:white;
    text-decoration:none;

    background:rgba(255,255,255,0.06);

    transition:0.3s ease;
}

.sidebar a:hover{
    background:rgba(13,110,253,0.9);
    transform:translateX(6px);
    box-shadow:0 10px 20px rgba(13,110,253,0.35);
}

/* ================== MAIN ================== */
.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

/* ================== HEADER SAAS ================== */
.header{
    position:sticky;
    top:0;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:18px 25px;

    background:rgba(0,0,0,0.35);
    backdrop-filter:blur(14px);

    border-bottom:1px solid rgba(255,255,255,0.08);

    animation:fadeDown .6s ease;
}

.header h2{
    font-size:18px;
    margin:0;
    letter-spacing:0.5px;
}

/* ================== BUTTON ================== */
.btn-voltar-login{
    padding:8px 14px;
    border-radius:10px;

    background:#ff4d4d;
    color:white;

    text-decoration:none;
    font-weight:600;

    transition:0.3s;
}

.btn-voltar-login:hover{
    transform:scale(1.05);
    box-shadow:0 10px 20px rgba(255,77,77,0.3);
}

/* ================== CONTENT ================== */
.content{
    flex:1;

    display:flex;
    align-items:center;
    justify-content:center;

    position:relative;
}

/* Overlay central tipo SaaS */
.hero-overlay{
    text-align:center;

    background:rgba(0,0,0,0.35);
    backdrop-filter:blur(10px);

    padding:40px 60px;
    border-radius:20px;

    border:1px solid rgba(255,255,255,0.1);

    animation:zoomIn 0.8s ease;
}

.hero-overlay h1{
    font-size:28px;
    margin-bottom:10px;
}

.hero-overlay p{
    opacity:0.7;
}

/* ================== ANIMAÇÕES ================== */
@keyframes fadeDown{
    from{opacity:0; transform:translateY(-15px);}
    to{opacity:1; transform:translateY(0);}
}

@keyframes slideInLeft{
    from{opacity:0; transform:translateX(-30px);}
    to{opacity:1; transform:translateX(0);}
}

@keyframes zoomIn{
    from{opacity:0; transform:scale(0.9);}
    to{opacity:1; transform:scale(1);}
}

/* ================== RESPONSIVO ================== */
@media(max-width:768px){

    .sidebar{
        position:fixed;
        left:-270px;
        top:0;
        height:100%;
        z-index:999;
        transition:0.3s;
    }

    .sidebar.active{
        left:0;
    }
}

</style>
</head>

<body>

<div class="dashboard">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <h3>NAVEGAÇÃO</h3>

        <a th:href="@{/clientes}"><i class="fa fa-users"></i> Clientes</a>
        <a th:href="@{/quartos}"><i class="fa fa-bed"></i> Quartos</a>
        <a th:href="@{/reservas}"><i class="fa fa-calendar"></i> Reservas</a>
        <a th:href="@{/pagamentos}"><i class="fa fa-credit-card"></i> Pagamentos</a>
        <a th:href="@{/recibos}"><i class="fa fa-file"></i> Recibos</a>

        <div sec:authorize="hasAnyRole('ADMIN','GERENTE')">
            <a th:href="@{/relatorios/financeiro}">
                <i class="fa fa-chart-line"></i> Relatórios
            </a>
        </div>

        <div sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/usuarios}" style="background:#ffc107;color:black;">
                <i class="fa fa-user"></i> Utilizadores
            </a>
        </div>

    </aside>

    <!-- MAIN -->
    <div class="main">

        <!-- HEADER -->
        <div class="header">

              <h2>   HOTEL DOS ENGENHERIOS : ESTENIO . ORISVALDO  . JOSE </h2>

            <a href="/login" class="btn-voltar-login">Sair</a>

        </div>

        <!-- CONTENT -->
        <div class="content">

            <div class="hero-overlay">
                <h1>Bem-vindo ao Sistema</h1>
                <p>       Gestao de Hotel da Cidade de Quelimane, na Zambezia</p>
            </div>

        </div>

    </div>

</div>

</body>
</html>
