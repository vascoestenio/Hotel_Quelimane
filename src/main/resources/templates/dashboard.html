<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard - Hotel Engenheiros</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== BASE ===== */
body{
    margin:0;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;

    background:
    linear-gradient(rgba(9,20,40,.78),
    rgba(15,25,45,.82)),
    url(/imagens/hotel.jpg);

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;

    color:white;
}

/* ===== LAYOUT ===== */
.dashboard{
    display:flex;
    min-height:100vh;
}

/* ===== MAIN ===== */
.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

/* ===== HEADER ===== */
.header{
    background:#111;
    color:white;
    padding:15px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header h2{
    margin:0;
    font-size:20px;
}

.menu-toggle{
    display:none;
    background:none;
    border:none;
    color:white;
    font-size:22px;
}

/* ===== SIDEBAR DIREITA ===== */
.sidebar{
    width:260px;
    background:#1a1a1a;
    color:white;
    display:flex;
    flex-direction:column;
    padding:20px;
    gap:10px;
}

.sidebar h3{
    margin-bottom:10px;
}

.sidebar a{
    color:white;
    text-decoration:none;
    padding:10px;
    background:#2c2c2c;
    border-radius:8px;
    transition:0.3s;
    display:flex;
    gap:10px;
    align-items:center;
}

.sidebar a:hover{
    background:#0d6efd;
}

/* ===== CONTENT ===== */
.content{
    padding:20px;
}

/* ===== KPIS ===== */
.kpis{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:15px;
    margin-bottom:20px;
}

.card-kpi{
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
    text-align:center;
}

.card-kpi h5{
    margin:0;
    color:#666;
}

.card-kpi h2{
    margin-top:10px;
    color:#0d6efd;
}

/* ===== CHARTS ===== */
.charts{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:20px;
}

canvas{
    background:white;
    padding:10px;
    border-radius:10px;
}

/* ===== BOTÃO VOLTAR ===== */
.btn-voltar-login{
    padding:8px 15px;
    background:#dc3545;
    color:white;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

/* ===== RESPONSIVO ===== */
@media(max-width:768px){

    .charts{
        grid-template-columns:1fr;
    }

    .kpis{
        grid-template-columns:1fr;
    }

    .sidebar{
        position:fixed;
        right:-260px;
        top:0;
        height:100%;
        transition:0.3s;
        z-index:999;
    }

    .sidebar.active{
        right:0;
    }

    .menu-toggle{
        display:block;
    }
}

</style>
</head>

<body>

<div class="dashboard">

    <!-- ================= MAIN ================= -->
    <div class="main">

        <!-- HEADER -->
        <div class="header">

            <button class="menu-toggle" onclick="toggleMenu()">☰</button>

            <h2>Hotel Engenheiros - ESTENIO. ORISVALDO  .JOSE</h2>

            <a href="/login" class="btn-voltar-login">
                ← Voltar
            </a>

        </div>

        <!-- CONTENT -->
        <div class="content">

            <!-- ================= KPI ================= -->
            <div class="kpis">

                <div class="card-kpi">
                    <h5>Clientes</h5>
                    <h2 th:text="${totalClientes}">0</h2>
                </div>

                <div class="card-kpi">
                    <h5>Reservas</h5>
                    <h2 th:text="${totalReservas}">0</h2>
                </div>

                <div class="card-kpi">
                    <h5>Receita</h5>
                    <h2 th:text="${receitaTotal}">0</h2>
                </div>

            </div>

            <!-- ================= CHARTS ================= -->
            <div class="charts">

                <canvas id="metodoChart"></canvas>
                <canvas id="clientesChart"></canvas>
                <canvas id="quartosChart"></canvas>

            </div>

        </div>

    </div>

    <!-- ================= SIDEBAR DIREITA ================= -->
    <aside class="sidebar">

        <h3>Menu</h3>

        <a th:href="@{/clientes}"><i class="fa fa-users"></i> Clientes</a>
        <a th:href="@{/quartos}"><i class="fa fa-bed"></i> Quartos</a>
        <a th:href="@{/reservas}"><i class="fa fa-calendar"></i> Reservas</a>
        <a th:href="@{/pagamentos}"><i class="fa fa-credit-card"></i> Pagamentos</a>
        <a th:href="@{/recibos}"><i class="fa fa-file"></i> Recibos</a>

        <div sec:authorize="hasAnyRole('ADMIN','GERENTE')">
            <a th:href="@{/relatorios/financeiro}">
                <i class="fa fa-chart-line"></i> Relatórios
            </a>
        </div>

        <div sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/usuarios}" style="background:#ffc107;color:black;">
                <i class="fa fa-user"></i> Utilizadores
            </a>
        </div>

    </aside>

</div>

<!-- ================= JS SIDEBAR ================= -->
<script>
function toggleMenu(){
    document.querySelector('.sidebar').classList.toggle('active');
}
</script>

<!-- ================= CHARTS ================= -->
<script th:inline="javascript">

const metodos = /*[[${metodos}]]*/ [];
const metodoNome = metodos.map(m => m[0]);
const metodoValor = metodos.map(m => m[1]);

new Chart(document.getElementById('metodoChart'), {
    type: 'pie',
    data: {
        labels: metodoNome,
        datasets: [{
            data: metodoValor,
            backgroundColor: ['#20c997','#0d6efd','#ffc107','#dc3545','#6610f2']
        }]
    }
});

const clientes = /*[[${clientes}]]*/ [];
const clientesNome = clientes.map(c => c[0]);
const clientesValor = clientes.map(c => c[1]);

new Chart(document.getElementById('clientesChart'), {
    type: 'bar',
    data: {
        labels: clientesNome,
        datasets: [{
            label: 'Top Clientes',
            data: clientesValor,
            backgroundColor: '#198754'
        }]
    }
});

const quartos = /*[[${quartos}]]*/ [];
const quartosNome = quartos.map(q => q[0]);
const quartosValor = quartos.map(q => q[1]);

new Chart(document.getElementById('quartosChart'), {
    type: 'bar',
    data: {
        labels: quartosNome,
        datasets: [{
            label: 'Quartos',
            data: quartosValor,
            backgroundColor: '#0dcaf0'
        }]
    }
});

</script>

</body>
</html>
