<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Utilizadores</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
    min-height:100vh;

    background:
    linear-gradient(rgba(0,0,0,.70),rgba(0,0,0,.70)),
    url('https://images.unsplash.com/photo-1566073771259-6a8506099945');

    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

.header{
    background:rgba(255,255,255,.10);
    backdrop-filter:blur(15px);
    color:white;
    padding:25px;
    border-radius:20px;
    margin-bottom:20px;
    animation:fadeDown .8s ease;
}

@keyframes fadeDown{
    from{opacity:0; transform:translateY(-30px);}
    to{opacity:1; transform:translateY(0);}
}

.card-table{
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(15px);
    padding:25px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,.4);
}

table{
    background:white;
    border-radius:12px;
    overflow:hidden;
}

.btn-novo{
    background:#198754;
    color:white;
    border-radius:25px;
}
.btn-novo:hover{
    background:#157347;
    color:white;
}

.btn-edit{
    background:#ffc107;
    color:black;
    border-radius:20px;
    padding:5px 10px;
}
.btn-edit:hover{
    background:#e0a800;
    color:black;
}

.btn-delete{
    background:#dc3545;
    color:white;
    border-radius:20px;
    padding:5px 10px;
}
.btn-delete:hover{
    background:#bb2d3b;
}

.badge-admin{background:#dc3545; color:white;}
.badge-gerente{background:#ffc107; color:black;}
.badge-recepcionista{background:#198754; color:white;}

</style>

</head>

<body>

<div class="container mt-4">

    <div class="header">

        <a th:href="@{/dashboard}" class="btn btn-secondary mb-3">
            <i class="fas fa-arrow-left"></i> Voltar
        </a>

        <h2>
            <i class="fas fa-user-shield"></i>
            Gestão de Utilizadores
        </h2>

        <p>Sistema de Hotel - Administração de Acessos</p>

    </div>

    <a th:href="@{/usuarios/novo}" class="btn btn-novo mb-3">
        <i class="fas fa-plus"></i> Novo Utilizador
    </a>

    <div class="card-table">

        <table class="table table-hover align-middle">

            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Username</th>
                    <th>Perfil</th>
                    <th>Ações</th>
                </tr>
            </thead>

            <tbody>

                <tr th:each="u : ${usuarios}">

                    <td th:text="${u.id}"></td>
                    <td th:text="${u.nome}"></td>
                    <td th:text="${u.username}"></td>

                    <td>

                        <span th:if="${u.perfil.name() == 'ADMIN'}"
                              class="badge badge-admin">
                            ADMIN
                        </span>

                        <span th:if="${u.perfil.name() == 'GERENTE'}"
                              class="badge badge-gerente">
                            GERENTE
                        </span>

                        <span th:if="${u.perfil.name() == 'RECEPCIONISTA'}"
                              class="badge badge-recepcionista">
                            RECEPCIONISTA
                        </span>

                    </td>

                    <td>

                        <!-- EDITAR -->
                        <a th:href="@{'/usuarios/editar/' + ${u.id}}"
                           class="btn btn-edit btn-sm">
                            <i class="fas fa-edit"></i>
                        </a>

                        <!-- ELIMINAR -->
                        <a th:href="@{'/usuarios/eliminar/' + ${u.id}}"
                           class="btn btn-delete btn-sm"
                           onclick="return confirm('Tem certeza que deseja eliminar este utilizador?');">
                            <i class="fas fa-trash"></i>
                        </a>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
