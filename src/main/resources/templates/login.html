<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Login - Hotel Quelimane</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }

        body {
            height: 100vh;
            width: 100%;

            /* IMAGEM DE FUNDO */
            background-image: url('/imagens/fundo-login.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            position: relative;
        }

        /* CAMADA ESCURA PREMIUM (melhorada) */
        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;

            background: rgba(0,0,0,0.65);

            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;

            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* MENSAGEM TOPO */
        .titulo {
            color: white;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
            padding: 0 20px;

            max-width: 80%;

            animation: slideDown 1s ease-in-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* CAIXA LOGIN (GLASS PREMIUM SEM MUDAR ESTRUTURA) */
        .box {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);

            padding: 30px;
            border-radius: 12px;

            width: 320px;

            box-shadow: 0 10px 30px rgba(0,0,0,0.4);

            border: 1px solid rgba(255,255,255,0.2);

            animation: slideUp 1s ease-in-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* INPUTS PREMIUM */
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;

            border: none;
            border-radius: 8px;

            outline: none;

            background: rgba(255,255,255,0.95);

            transition: 0.3s;
        }

        input:focus {
            transform: scale(1.02);
            box-shadow: 0 0 10px rgba(37,99,235,0.5);
        }

        /* BOTÃO PREMIUM */
        button {
            width: 100%;
            padding: 12px;

            background: linear-gradient(135deg, #2563eb, #1e40af);
            color: white;

            border: none;
            border-radius: 8px;

            cursor: pointer;

            font-weight: bold;

            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        button:active {
            transform: scale(0.98);
        }

        /* ERROS */
        .error {
            color: #ff6b6b;
            font-size: 14px;
            text-align: center;
            margin-top: 10px;
        }

    </style>
</head>

<body>

<div class="overlay">

    <!-- MENSAGEM TOPO (mantida) -->
    <div class="titulo">
        MESTRADO EM TECNOLOGIA DE INFORMAÇÃO PELA FCSP - UCM - QUELIMANE. 
    </div>

    <!-- LOGIN (estrutura intacta) -->
    <div class="box">

        <form th:action="@{/login}" method="post">

            <input type="text" name="username" placeholder="Username" required>

            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Entrar</button>

        </form>

        <p class="error" th:if="${param.error}">
            Usuário ou senha inválidos
        </p>

        <p class="error" th:if="${param.logout}">
            Sessão terminada com sucesso
        </p>

    </div>

</div>

</body>
</html>
