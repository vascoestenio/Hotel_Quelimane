<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard - Hotel Engenheiros</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    margin:0;
    padding:0;
    min-height:100vh;
    background-image:url('/imagens/hotel.jpg');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    font-family:Arial;
}

/* camada escura */
.overlay{
    min-height:100vh;
    background:rgba(0,0,0,0.65);
    display:flex;
    flex-direction:column;
}

/* topo */
.navbar{
    background:rgba(0,0,0,0.85);
}

.navbar-brand{
    color:white;
    font-weight:bold;
}

/* centro */
.hero{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
}

.hero h1{
    font-size:55px;
    font-weight:bold;
    text-shadow:3px 3px 10px black;
}

.hero p{
    font-size:20px;
}

/* botões módulos */
.modules{
    margin-top:30px;
}

.modules a{
    margin:10px;
    padding:12px 25px;
    font-size:18px;
    border-radius:10px;
    text-decoration:none;
    display:inline-block;
    color:white;
    font-weight:bold;
    transition:0.3s;
}

.modules a:hover{
    transform:scale(1.05);
}

.clientes{background:#0d6efd;}
.quartos{background:#198754;}
.reservas{background:#ffc107; color:black;}
.pagamentos{background:#dc3545;}
.recibos{background:#6610f2;}

/* NOVO BOTÃO RELATÓRIO FINANCEIRO */
.relatorio{background:#20c997;}

.footer{
    text-align:center;
    color:white;
    padding:15px;
    background:rgba(0,0,0,0.7);
}

/* contactos */
.contactos{
    margin-top:20px;
    font-size:16px;
}

</style>
<style>
.btn-voltar-login {
    display: inline-flex;
    align-items: center;
    gap: 8px;

    padding: 12px 18px;
    background: linear-gradient(135deg, #dc3545, #b02a37);
    color: white;
    border: none;
    border-radius: 10px;

    font-weight: 600;
    text-decoration: none;

    transition: all 0.3s ease;
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    position: relative;
    overflow: hidden;
}

.btn-voltar-login i {
    transition: transform 0.3s ease;
}

/* hover animação */
.btn-voltar-login:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    background: linear-gradient(135deg, #ff4d5a, #c82333);
}

.btn-voltar-login:hover i {
    transform: translateX(-5px);
}

/* efeito de brilho */
.btn-voltar-login::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.2);
    transform: skewX(-25deg);
    transition: 0.5s;
}

.btn-voltar-login:hover::before {
    left: 120%;
}
</style>

<a href="/login" class="btn-voltar-login">
    <i class="fas fa-arrow-left"></i>
       Voltar
</a>

</head>

<body>

<div class="overlay">

	<nav class="navbar navbar-dark px-4 d-flex justify-content-between">

	    <span class="navbar-brand">
	        HOTEL ENGENHEIROS
	    </span>

	    <div sec:authorize="hasRole('ADMIN')">
	        <a th:href="@{/usuarios}"
	           class="btn btn-warning">
	            Utilizadores
	        </a>
	    </div>

	</nav>

    <!-- HERO -->
    <div class="hero">

        <h1>HOTEL ENGENHEIROS</h1>

        <p>ESTENIO • JOSE • ORISVALDO</p>

        <p>Sistema de Gestão Hoteleira</p>

        <!-- CONTACTOS -->
        <div class="contactos">
            📞 864629657 / 868999752 / 844705514 <br>
            ✉️ vascoestenio@gmail.com
        </div>

		<!-- BOTÕES MÓDULOS -->
		<div class="modules">

		    <a th:href="@{/clientes}" class="clientes">Clientes</a>

		    <a th:href="@{/quartos}" class="quartos">Quartos</a>

		    <a th:href="@{/reservas}" class="reservas">Reservas</a>

		    <a th:href="@{/pagamentos}" class="pagamentos">Pagamentos</a>

		    <a th:href="@{/recibos}" class="recibos">Recibo Pagamento</a>

		    <!-- RELATÓRIO FINANCEIRO (NOVO) -->
		    <div sec:authorize="hasAnyRole('ADMIN','GERENTE')">
		        <a th:href="@{/relatorios/financeiro}" class="relatorio">
		            Relatório Financeiro
		        </a>
		    </div>

		</div>

    </div>

    <!-- FOOTER -->
    <div class="footer">
        © 2026 Hotel Engenheiros - Sistema de Gestão
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script th:inline="javascript">

/* =========================
   RECEITA POR MÉTODO
========================= */
const metodosLabels = /*[[${metodos}]]*/ [];
const metodoNome = metodosLabels.map(m => m[0]);
const metodoValor = metodosLabels.map(m => m[1]);

new Chart(document.getElementById('metodoChart'), {
    type: 'pie',
    data: {
        labels: metodoNome,
        datasets: [{
            label: 'Métodos de Pagamento',
            data: metodoValor,
            backgroundColor: [
                '#20c997',
                '#0d6efd',
                '#ffc107',
                '#dc3545',
                '#6610f2'
            ]
        }]
    }
});


/* =========================
   TOP CLIENTES
========================= */
const clientesData = /*[[${clientes}]]*/ [];
const clientesNome = clientesData.map(c => c[0]);
const clientesValor = clientesData.map(c => c[1]);

new Chart(document.getElementById('clientesChart'), {
    type: 'bar',
    data: {
        labels: clientesNome,
        datasets: [{
            label: 'Clientes que Mais Gastaram (MT)',
            data: clientesValor,
            backgroundColor: '#198754'
        }]
    }
});


/* =========================
   QUARTOS MAIS RENTÁVEIS
========================= */
const quartosData = /*[[${quartos}]]*/ [];
const quartosNome = quartosData.map(q => q[0]);
const quartosValor = quartosData.map(q => q[1]);

new Chart(document.getElementById('quartosChart'), {
    type: 'bar',
    data: {
        labels: quartosNome,
        datasets: [{
            label: 'Receita por Quarto (MT)',
            data: quartosValor,
            backgroundColor: '#0dcaf0'
        }]
    }
});

</script>
</body>
</html>
