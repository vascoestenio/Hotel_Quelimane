<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Lista de Recibos - Hotel Quelimane 05 Estrela</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    min-height:100vh;

    background:
    linear-gradient(rgba(0,0,0,.75),rgba(0,0,0,.75)),
    url('https://images.unsplash.com/photo-1551882547-ff40c63fe5fa');

    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    font-family:'Segoe UI',sans-serif;
}

.area{

    margin-top:35px;

    background:rgba(255,255,255,.12);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.15);

    border-radius:25px;

    padding:30px;

    box-shadow:
    0 20px 50px rgba(0,0,0,.5);

    animation:entrada 1s ease;
}

@keyframes entrada{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

.titulo{

    text-align:center;

    color:white;

    margin-bottom:25px;
}

.titulo i{

    font-size:55px;

    color:#FFD700;

    animation:pulse 2s infinite;
}

@keyframes pulse{

    0%{transform:scale(1);}
    50%{transform:scale(1.15);}
    100%{transform:scale(1);}
}

.titulo h2{

    margin-top:10px;

    font-weight:800;

    letter-spacing:2px;
}

.titulo p{

    color:#FFD700;

    font-size:18px;
}

.contador{

    background:rgba(255,215,0,.15);

    color:#FFD700;

    border:1px solid rgba(255,215,0,.4);

    padding:12px;

    border-radius:15px;

    text-align:center;

    font-size:18px;

    font-weight:bold;

    margin-bottom:20px;
}

.pesquisa{

    margin-bottom:20px;
}

.pesquisa input{

    border-radius:30px;

    padding:12px 20px;

    border:none;
}

.pesquisa input:focus{

    box-shadow:0 0 15px gold;
}

.table{

    background:white;

    border-radius:15px;

    overflow:hidden;
}

thead{

    background:#1c2331;

    color:white;
}

tbody tr{

    transition:.3s;
}

tbody tr:hover{

    background:#fff9db;

    transform:scale(1.01);
}

.btn{

    border-radius:30px;

    transition:.3s;

    font-weight:bold;
}

.btn:hover{

    transform:translateY(-3px);
}

.btn-voltar{

    background:linear-gradient(45deg,#6c757d,#495057);

    color:white;

    padding:10px 25px;

    text-decoration:none;

    border-radius:30px;

    font-weight:bold;

    display:inline-block;

    margin-bottom:20px;

    transition:.4s;
}

.btn-voltar:hover{

    transform:translateY(-3px);

    color:white;

    box-shadow:0 10px 25px rgba(255,255,255,.2);
}

.footer-info{

    margin-top:20px;

    text-align:center;

    color:white;
}

</style>

</head>

<body>

<div class="container">

<div class="area">

<div class="titulo">

    <i class="fas fa-file-invoice-dollar"></i>

    <h2>GESTÃO DE RECIBOS</h2>

    <p>Hotel Quelimane 05 Estrela</p>

</div>

<a th:href="@{/dashboard}" class="btn-voltar">
    <i class="fas fa-arrow-left"></i>
    Voltar
</a>

<div class="contador">
    <i class="fas fa-chart-bar"></i>
    Total de Recibos:
    <span th:text="${#lists.size(recibos)}"></span>
</div>

<div class="pesquisa">

    <input
        type="text"
        id="pesquisa"
        class="form-control"
        placeholder="🔍 Pesquisar recibo...">

</div>

<div class="table-responsive">

<table class="table table-bordered table-hover" id="tabelaRecibos">

<thead>

<tr>
    <th>ID</th>
    <th>Número</th>
    <th>Reserva</th>
    <th>Valor Pago</th>
    <th>Método</th>
    <th>Status</th>
    <th>Ações</th>
</tr>

</thead>

<tbody>

<tr th:each="r : ${recibos}">

    <td th:text="${r.id}"></td>

    <td th:text="${r.numeroRecibo}"></td>

    <td th:text="${r.reserva.id}"></td>

    <td th:text="${r.valorPago}"></td>

    <td th:text="${r.metodoPagamento}"></td>

    <td>

        <span class="badge bg-success"
              th:text="${r.status}">
        </span>

    </td>

    <td>

        <a th:href="@{/recibos/ver/{id}(id=${r.id})}"
           class="btn btn-info btn-sm">

            <i class="fas fa-eye"></i>
            Ver

        </a>

        <a th:href="@{/recibos/pdf/{id}(id=${r.id})}"
           class="btn btn-success btn-sm">

            <i class="fas fa-file-pdf"></i>
            PDF

        </a>

        <a th:href="@{/recibos/eliminar/{id}(id=${r.id})}"
           class="btn btn-danger btn-sm"

           onclick="return confirm('Tem certeza que deseja eliminar este recibo?')">

            <i class="fas fa-trash"></i>
            Eliminar

        </a>

    </td>

</tr>

</tbody>

</table>

</div>

<div class="footer-info">

    <i class="fas fa-hotel"></i>

    Sistema de Gestão Hoteleira • Hotel Quelimane 05 Estrela

</div>

</div>

</div>

<script>

document.getElementById("pesquisa")
.addEventListener("keyup", function(){

    let filtro =
    this.value.toLowerCase();

    let linhas =
    document.querySelectorAll(
    "#tabelaRecibos tbody tr");

    linhas.forEach(function(linha){

        let texto =
        linha.textContent.toLowerCase();

        linha.style.display =
        texto.includes(filtro)
        ? ""
        : "none";

    });

});

</script>

</body>
</html>
