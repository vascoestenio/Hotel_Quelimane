```html
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Registo de Pagamento</title>

<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet">

<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Poppins',sans-serif;

    min-height:100vh;

    display:flex;
    align-items:center;
    justify-content:center;

    padding:30px;

    background:
    linear-gradient(rgba(0,0,0,.75),rgba(0,0,0,.75)),
    url('https://images.unsplash.com/photo-1551882547-ff40c63fe5fa');

    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

.card-form{

    width:520px;

    background:rgba(255,255,255,.12);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.15);

    border-radius:25px;

    padding:35px;

    box-shadow:
    0 20px 50px rgba(0,0,0,.5);

    animation:fadeIn .8s ease-in-out;
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

.titulo-icon{

    text-align:center;

    font-size:55px;

    color:#FFD700;

    margin-bottom:10px;

    animation:pulse 2s infinite;
}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.15);
    }

    100%{
        transform:scale(1);
    }
}

h2{

    text-align:center;

    font-weight:700;

    color:white;

    margin-bottom:25px;

    letter-spacing:1px;
}

label{

    color:white;

    font-weight:600;

    margin-bottom:5px;
}

.form-control,
.form-select{

    border:none;

    border-radius:12px;

    padding:12px;

    transition:.3s;
}

.form-control:focus,
.form-select:focus{

    box-shadow:0 0 15px #FFD700;

    transform:scale(1.02);
}

.form-control:hover,
.form-select:hover{

    transform:scale(1.01);
}

.btn-custom{

    width:100%;

    background:
    linear-gradient(135deg,#11998e,#38ef7d);

    border:none;

    padding:13px;

    font-weight:600;

    border-radius:15px;

    color:white;

    transition:.4s;
}

.btn-custom:hover{

    transform:translateY(-4px);

    box-shadow:
    0 10px 25px rgba(56,239,125,.45);
}

.btn-secondary{

    width:100%;

    margin-top:12px;

    border-radius:15px;

    transition:.4s;
}

.btn-secondary:hover{

    transform:translateY(-4px);
}

.info-box{

    background:rgba(255,215,0,.12);

    border:1px solid rgba(255,215,0,.3);

    color:#FFD700;

    padding:10px;

    border-radius:12px;

    text-align:center;

    margin-bottom:20px;

    font-size:14px;
}

.footer-premium{

    text-align:center;

    color:white;

    margin-top:20px;

    font-size:13px;
}

.footer-premium i{

    color:#FFD700;
}

</style>

</head>

<body>

<div class="card-form">

    <div class="titulo-icon">
        <i class="fas fa-credit-card"></i>
    </div>

    <h2>Registo de Pagamento</h2>

    <div class="info-box">
        <i class="fas fa-hotel"></i>
        Hotel Quelimane Premium • Gestão Financeira
    </div>

    <form th:action="@{/pagamentos/salvar}"
          th:object="${pagamento}"
          method="post">

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label>
                <i class="fas fa-calendar-check"></i>
                Reserva
            </label>

            <select class="form-select"
                    th:field="*{reserva.id}"
                    id="reservaSelect"
                    required>

                <option value="">
                    -- Selecionar Reserva --
                </option>

                <option th:each="r : ${reservas}"
                        th:value="${r.id}"
                        th:text="'Reserva #' + ${r.id}
                                + ' | Cliente: ' + ${r.cliente.nome}
                                + ' | Quarto: ' + ${r.quarto.numero}">
                </option>

            </select>
        </div>

        <div class="mb-3">

            <label>
                <i class="fas fa-money-bill-wave"></i>
                Valor da Reserva
            </label>

            <input type="text"
                   id="valorReserva"
                   class="form-control"
                   readonly>

        </div>

        <div class="mb-3">

            <label>
                <i class="fas fa-credit-card"></i>
                Método de Pagamento
            </label>

            <select class="form-select"
                    th:field="*{metodo}"
                    required>

                <option value="">
                    -- Selecionar --
                </option>

                <option value="DINHEIRO">💵 Dinheiro</option>
                <option value="M_PESA">📱 M-Pesa</option>
                <option value="E_MOLA">📲 e-Mola</option>
                <option value="TRANSFERENCIA">🏦 Transferência</option>
                <option value="VISA">💳 VISA</option>
                <option value="MASTERCARD">💳 MasterCard</option>

            </select>

        </div>

        <div class="mb-3">

            <label>
                <i class="fas fa-calendar"></i>
                Data do Pagamento
            </label>

            <input type="date"
                   class="form-control"
                   th:field="*{dataPagamento}"
                   required>

        </div>

        <button type="submit" class="btn-custom">

            <i class="fas fa-save"></i>

            Guardar Pagamento

        </button>

        <a th:href="@{/dashboard}"
           class="btn btn-secondary">

            <i class="fas fa-arrow-left"></i>

            Voltar

        </a>

    </form>

    <div class="footer-premium">

        <i class="fas fa-hotel"></i>

        Sistema de Gestão Hoteleira 05 Estrela

    </div>

</div>

<script>

document.getElementById("reservaSelect").addEventListener("change", function () {

    let id = this.value;

    if (!id) {

        document.getElementById("valorReserva").value = "";

        return;
    }

    fetch("/reservas/valor/" + id)

        .then(res => res.json())

        .then(data => {

            document.getElementById("valorReserva").value = data.valor;

        })

        .catch(err => {

            console.log("Erro ao buscar valor:", err);

        });

});

</script>

</body>
</html>
```
