<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Erro - Sistema Hotel</title>

<style>
    /* ===== FUNDO PREMIUM ===== */
    body {
        margin: 0;
        height: 100vh;
        font-family: 'Segoe UI', sans-serif;

        background: linear-gradient(
            rgba(0,0,0,0.6),
            rgba(0,0,0,0.6)
        ),
        url('https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?auto=format&fit=crop&w=1600&q=80');

        background-size: cover;
        background-position: center;
        display: flex;
        justify-content: center;
        align-items: center;

        overflow: hidden;
    }

    /* ===== CAIXA CENTRAL ===== */
    .box {
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);

        padding: 40px 35px;
        border-radius: 16px;
        text-align: center;

        box-shadow: 0 10px 40px rgba(0,0,0,0.4);

        width: 420px;

        animation: fadeIn 1s ease-in-out;
    }

    /* ===== TÍTULO ===== */
    h1 {
        color: #ffffff;
        font-size: 26px;
        margin-bottom: 10px;

        animation: slideDown 0.8s ease-in-out;
    }

    p {
        color: #e0e0e0;
        font-size: 15px;
        margin-bottom: 20px;
    }

    small {
        color: #ffcccb;
        display: block;
        margin-top: 10px;
        font-size: 12px;
    }

    /* ===== BOTÃO ===== */
    .btn {
        display: inline-block;
        margin-top: 20px;
        padding: 12px 25px;

        background: linear-gradient(45deg, #ff6b6b, #ff8e53);
        color: white;
        text-decoration: none;

        border-radius: 30px;
        font-weight: bold;

        transition: 0.4s ease;
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .btn:hover {
        transform: scale(1.05);
        box-shadow: 0 8px 25px rgba(255, 107, 107, 0.6);
    }

    /* ===== ANIMAÇÕES ===== */
    @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.9); }
        to { opacity: 1; transform: scale(1); }
    }

    @keyframes slideDown {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* ===== PARTÍCULAS (efeito luxo) ===== */
    .circle {
        position: absolute;
        border-radius: 50%;
        background: rgba(255,255,255,0.1);
        animation: float 6s infinite ease-in-out;
    }

    .circle:nth-child(1) {
        width: 80px;
        height: 80px;
        top: 10%;
        left: 15%;
    }

    .circle:nth-child(2) {
        width: 120px;
        height: 120px;
        bottom: 15%;
        right: 10%;
        animation-delay: 2s;
    }

    .circle:nth-child(3) {
        width: 60px;
        height: 60px;
        bottom: 20%;
        left: 20%;
        animation-delay: 4s;
    }

    @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-20px); }
        100% { transform: translateY(0px); }
    }

</style>

</head>

<body>

<!-- partículas -->
<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>

<div class="box">

    <h1 th:text="${titulo}">Erro</h1>

    <p th:text="${mensagem}">
        Ocorreu um problema inesperado.
    </p>

    <small th:text="${detalhe}"></small>

    <a href="/dashboard" class="btn">Voltar ao Sistema</a>

</div>

</body>
</html>
