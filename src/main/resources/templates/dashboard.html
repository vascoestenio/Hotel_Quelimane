<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard - Hotel Engenheiros</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== BASE ===== */
body{
    margin:0;
    font-family:Arial;
    background:#f4f6f9;
}

/* ===== LAYOUT ===== */
.dashboard{
    display:flex;
    min-height:100vh;
}

/* ===== CONTEÚDO PRINCIPAL ===== */
.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

/* ===== HEADER ===== */
.header{
    background:#111;
    color:white;
    padding:15px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header h2{
    margin:0;
    font-size:20px;
}

/* botão voltar */
.btn-voltar-login{
    padding:8px 15px;
    background:#dc3545;
    color:white;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

/* ===== CONTEÚDO ===== */
.content{
    padding:20px;
}

/* ===== CHARTS ===== */
.charts{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:20px;
}

canvas{
    background:white;
    padding:10px;
    border-radius:10px;
}

/* ===== SIDEBAR DIREITA ===== */
.sidebar{
    width:260px;
    background:#1a1a1a;
    color:white;
    display:flex;
    flex-direction:column;
    padding:20px;
    gap:10px;
}

.sidebar h3{
    margin-bottom:10px;
    font-size:18px;
}

.sidebar a{
    color:white;
    text-decoration:none;
    padding:10px;
    background:#2c2c2c;
    border-radius:8px;
    transition:0.3s;
}

.sidebar a:hover{
    background:#0d6efd;
}

/* permissões */
.admin-only{
    margin-top:10px;
}

</style>
</head>

<body>

<div class="dashboard">

    <!-- ================= SIDEBAR DIREITA ================= -->
    <aside class="sidebar">

        <h3>Menu</h3>

        <a th:href="@{/clientes}">Clientes</a>
        <a th:href="@{/quartos}">Quartos</a>
        <a th:href="@{/reservas}">Reservas</a>
        <a th:href="@{/pagamentos}">Pagamentos</a>
        <a th:href="@{/recibos}">Recibos</a>

        <div class="admin-only" sec:authorize="hasAnyRole('ADMIN','GERENTE')">
            <a th:href="@{/relatorios/financeiro}">
                Relatório Financeiro
            </a>
        </div>

        <div sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/usuarios}" style="background:#ffc107;color:black;">
                Utilizadores
            </a>
        </div>

    </aside>

    <!-- ================= CONTEÚDO PRINCIPAL ================= -->
    <div class="main">

        <!-- HEADER -->
        <div class="header">
            <h2>Hotel Engenheiros - Dashboard</h2>

            <a href="/login" class="btn-voltar-login">
                ← Voltar
            </a>
        </div>

        <!-- CONTENT -->
        <div class="content">

            <h4 class="mb-3">Visão Geral</h4>

            <!-- CHARTS -->
            <div class="charts">

                <canvas id="metodoChart"></canvas>
                <canvas id="clientesChart"></canvas>
                <canvas id="quartosChart"></canvas>

            </div>

        </div>

    </div>

</div>

<!-- ================= CHART JS ================= -->
<script th:inline="javascript">

/* ===== MÉTODOS DE PAGAMENTO ===== */
const metodos = /*[[${metodos}]]*/ [];
const metodoNome = metodos.map(m => m[0]);
const metodoValor = metodos.map(m => m[1]);

new Chart(document.getElementById('metodoChart'), {
    type: 'pie',
    data: {
        labels: metodoNome,
        datasets: [{
            data: metodoValor,
            backgroundColor: ['#20c997','#0d6efd','#ffc107','#dc3545','#6610f2']
        }]
    }
});


/* ===== TOP CLIENTES ===== */
const clientes = /*[[${clientes}]]*/ [];
const clientesNome = clientes.map(c => c[0]);
const clientesValor = clientes.map(c => c[1]);

new Chart(document.getElementById('clientesChart'), {
    type: 'bar',
    data: {
        labels: clientesNome,
        datasets: [{
            label: 'Clientes que Mais Gastaram (MT)',
            data: clientesValor,
            backgroundColor: '#198754'
        }]
    }
});


/* ===== QUARTOS ===== */
const quartos = /*[[${quartos}]]*/ [];
const quartosNome = quartos.map(q => q[0]);
const quartosValor = quartos.map(q => q[1]);

new Chart(document.getElementById('quartosChart'), {
    type: 'bar',
    data: {
        labels: quartosNome,
        datasets: [{
            label: 'Receita por Quarto (MT)',
            data: quartosValor,
            backgroundColor: '#0dcaf0'
        }]
    }
});

</script>

</body>
</html>
