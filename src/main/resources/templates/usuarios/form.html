<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Formulário de Utilizador</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;

    background:
    linear-gradient(rgba(0,0,0,.70),rgba(0,0,0,.70)),
    url('https://images.unsplash.com/photo-1566073771259-6a8506099945');

    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

.card-form{
    width:500px;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(15px);
    border-radius:25px;
    padding:30px;
    box-shadow:0 15px 40px rgba(0,0,0,.4);
    animation:fadeIn .8s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

h2{
    text-align:center;
    color:white;
    margin-bottom:20px;
    font-weight:bold;
    text-shadow:0 0 10px rgba(255,255,255,.3);
}

label{
    color:white;
    font-weight:bold;
}

.form-control,
.form-select{
    border-radius:12px;
    border:none;
    padding:12px;
}

.form-control:focus,
.form-select:focus{
    box-shadow:0 0 15px gold;
}

.btn{
    border-radius:25px;
    font-weight:bold;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-3px);
}

.small-text{
    color:#ddd;
    font-size:12px;
    margin-top:5px;
}

</style>

</head>

<body>

<div class="card-form">

<h2>
    <i class="fas fa-user-cog"></i>

    <!-- 🔥 ALTERAÇÃO DINÂMICA (CRIAR / EDITAR) -->
    <span th:text="${usuario.id == null} ? 'Cadastro de Utilizador' : 'Editar Utilizador'"></span>
</h2>

<form th:action="@{/usuarios/salvar}" method="post" th:object="${usuario}">

    <input type="hidden" th:field="*{id}">

    <!-- NOME -->
    <div class="mb-3">
        <label>Nome</label>
        <input type="text" class="form-control" th:field="*{nome}" required>
    </div>

    <!-- USERNAME -->
    <div class="mb-3">
        <label>Username</label>
        <input type="text" class="form-control" th:field="*{username}" required>
    </div>

    <!-- SENHA -->
    <div class="mb-3">
        <label>Senha</label>

        <input type="password"
               class="form-control"
               th:field="*{senha}"
               th:required="${usuario.id == null}">

        <div class="small-text">
            <span th:if="${usuario.id != null}">
                Deixe vazio para manter a senha atual
            </span>
        </div>
    </div>

    <!-- PERFIL -->
    <div class="mb-3">
        <label>Perfil</label>

        <select class="form-select" th:field="*{perfil}" required>

            <option value="">-- Selecionar Perfil --</option>
            <option value="ADMIN">ADMIN</option>
            <option value="GERENTE">GERENTE</option>
            <option value="RECEPCIONISTA">RECEPCIONISTA</option>

        </select>

    </div>

    <!-- BOTÕES -->
    <button type="submit" class="btn btn-success w-100">
        <i class="fas fa-save"></i>
        <span th:text="${usuario.id == null} ? 'Guardar' : 'Atualizar'"></span>
    </button>

    <a th:href="@{/usuarios}" class="btn btn-secondary w-100 mt-2">
        <i class="fas fa-times-circle"></i> Cancelar
    </a>

    <a th:href="@{/dashboard}" class="btn btn-dark w-100 mt-2">
        <i class="fas fa-home"></i> Dashboard
    </a>

</form>

</div>

</body>
</html>
