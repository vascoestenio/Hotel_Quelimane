<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Cliente</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
    min-height:100vh;

    background:
    linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
    url('https://images.unsplash.com/photo-1566073771259-6a8506099945');

    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    display:flex;
    justify-content:center;
    align-items:center;
}

.card-hotel{

    width:800px;

    background:rgba(255,255,255,.12);

    backdrop-filter:blur(15px);

    border-radius:25px;

    padding:35px;

    box-shadow:0 15px 40px rgba(0,0,0,.4);

    animation:subir 1s ease;
}

@keyframes subir{
    from{
        opacity:0;
        transform:translateY(50px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.titulo{
    text-align:center;
    color:white;
    margin-bottom:25px;
}

.titulo i{
    color:#FFD700;
    font-size:50px;
}

.titulo h2{
    margin-top:10px;
}

label{
    color:white;
    font-weight:bold;
}

.form-control{

    border:none;

    border-radius:12px;

    padding:12px;
}

.form-control:focus{
    box-shadow:0 0 15px gold;
}

.btn{
    border-radius:30px;
    padding:10px 25px;
}

</style>

</head>
<body>

<div class="card-hotel">

    <div class="titulo">
        <i class="fas fa-hotel"></i>
        <h2>Formulário Cliente</h2>
        <p>Hotel Quelimane Premium</p>
    </div>

    <form th:action="@{/clientes/salvar}" th:object="${cliente}" method="post">

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label>Nome</label>
            <input type="text" th:field="*{nome}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Documento</label>
            <input type="text" th:field="*{documento}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Telefone</label>
            <input type="text" th:field="*{telefone}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email" th:field="*{email}" class="form-control">
        </div>

        <button class="btn btn-success">
            <i class="fas fa-save"></i> Guardar
        </button>

        <a th:href="@{/clientes}" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Voltar
        </a>

        <a th:href="@{/dashboard}" class="btn btn-dark">
            <i class="fas fa-home"></i> Dashboard
        </a>

    </form>

</div>

</body>
</html>
