```html
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Lista de Quartos</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

min-height:100vh;

background:
linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.65)),
url('https://images.unsplash.com/photo-1566665797739-1674de7a421a');

background-size:cover;
background-position:center;
background-attachment:fixed;
}

.container{

width:95%;

margin:auto;

padding-top:30px;
}

.area{

background:rgba(255,255,255,.10);

backdrop-filter:blur(15px);

padding:30px;

border-radius:25px;

box-shadow:0 10px 35px rgba(0,0,0,.4);

animation:fadeIn 1s ease;
}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

h2{
text-align:center;
color:white;
margin-bottom:20px;
}

.acoes-topo{
margin-bottom:20px;
}

.btn{

padding:10px 20px;

border-radius:30px;

text-decoration:none;

font-weight:bold;

color:white;
}

.btn-voltar{
background:#6c757d;
}

.btn-novo{
background:#198754;
}

table{

width:100%;

border-collapse:collapse;

background:white;

border-radius:15px;

overflow:hidden;
}

th{

background:#d4af37;

color:black;

padding:15px;
}

td{

padding:12px;

text-align:center;

border-bottom:1px solid #ddd;
}

tr:hover{
background:#f5f5f5;
}

.btn-editar{

background:#ffc107;

padding:8px 12px;

border-radius:8px;

color:black;
}

.btn-remover{

background:#dc3545;

padding:8px 12px;

border-radius:8px;

color:white;
}

</style>
</head>

<body>

<div class="container">

<div class="area">

<h2>
<i class="fas fa-bed"></i>
Lista de Quartos
</h2>

<div class="acoes-topo">

<a th:href="@{/dashboard}" class="btn btn-voltar">
<i class="fas fa-home"></i>
Voltar
</a>

<a class="btn btn-novo" th:href="@{/quartos/novo}">
<i class="fas fa-plus"></i>
Novo Quarto
</a>

</div>

<table>

<thead>
<tr>
<th>ID</th>
<th>Número</th>
<th>Tipo</th>
<th>Preço / Noite</th>
<th>Estado</th>
<th>Ações</th>
</tr>
</thead>

<tbody>

<tr th:each="quarto : ${quartos}">

<td th:text="${quarto.id}"></td>

<td th:text="${quarto.numero}"></td>

<td th:text="${quarto.tipo}"></td>

<td th:text="${quarto.precoNoite}"></td>

<td th:text="${quarto.estado}"></td>

<td>

<a class="btn-editar"
th:href="@{'/quartos/editar/' + ${quarto.id}}">
<i class="fas fa-edit"></i>
Editar
</a>

<a class="btn-remover"
th:href="@{'/quartos/eliminar/' + ${quarto.id}}"
onclick="return confirm('Deseja realmente remover?')">
<i class="fas fa-trash"></i>
Remover
</a>

</td>

</tr>

</tbody>

</table>

</div>

</div>

</body>
</html>
```
