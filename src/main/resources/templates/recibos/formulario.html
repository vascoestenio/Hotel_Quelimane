<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Formulário de Recibo - Hotel Quelimane 05 Estrela</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:30px;

    font-family:'Segoe UI',sans-serif;

    background:
    linear-gradient(rgba(0,0,0,.75),rgba(0,0,0,.75)),
    url('https://images.unsplash.com/photo-1445019980597-93fa8acb246c');

    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

.card-form{

    width:100%;
    max-width:650px;

    background:rgba(255,255,255,.12);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.15);

    border-radius:30px;

    padding:35px;

    box-shadow:
    0 20px 50px rgba(0,0,0,.5);

    animation:entrada 1s ease;
}

@keyframes entrada{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

.titulo{

    text-align:center;

    color:white;

    margin-bottom:25px;
}

.titulo i{

    font-size:55px;

    color:#FFD700;

    margin-bottom:10px;

    animation:pulse 2s infinite;
}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.15);
    }

    100%{
        transform:scale(1);
    }
}

.titulo h2{

    font-weight:800;

    letter-spacing:1px;
}

.titulo p{

    color:#FFD700;

    margin-top:8px;
}

label{

    color:white;

    font-weight:bold;

    margin-bottom:5px;
}

.form-control{

    border:none;

    border-radius:15px;

    padding:12px;

    transition:.3s;
}

.form-control:focus{

    box-shadow:0 0 15px gold;

    transform:scale(1.02);
}

.form-control:hover{

    transform:scale(1.01);
}

.input-group-text{

    background:#FFD700;

    border:none;

    color:#000;

    font-weight:bold;
}

.btn{

    border-radius:30px;

    font-weight:bold;

    padding:12px;

    transition:.4s;
}

.btn-success{

    background:linear-gradient(45deg,#198754,#28a745);

    border:none;
}

.btn-success:hover{

    transform:translateY(-4px);

    box-shadow:0 10px 25px rgba(25,135,84,.5);
}

.btn-secondary:hover{

    transform:translateY(-4px);

    box-shadow:0 10px 25px rgba(108,117,125,.5);
}

.footer{

    margin-top:20px;

    text-align:center;

    color:white;

    font-size:14px;
}

.footer i{

    color:#FFD700;
}

</style>

</head>

<body>

<div class="card-form">

<div class="titulo">

    <i class="fas fa-file-invoice-dollar"></i>

    <h2>Formulário de Recibo</h2>

    <p>Hotel Quelimane 05 Estrela</p>

</div>

<form th:action="@{/recibos/salvar}"
      th:object="${recibo}"
      method="post">

<input type="hidden" th:field="*{id}">

<div class="mb-3">

    <label>
        <i class="fas fa-hashtag"></i>
        Número do Recibo
    </label>

    <input type="text"
           class="form-control"
           th:field="*{numeroRecibo}"
           placeholder="Digite o número do recibo"
           required>

</div>

<div class="mb-3">

    <label>
        <i class="fas fa-money-bill-wave"></i>
        Valor Pago
    </label>

    <div class="input-group">

        <span class="input-group-text">MZN</span>

        <input type="number"
               step="0.01"
               class="form-control"
               th:field="*{valorPago}"
               placeholder="0.00"
               required>

    </div>

</div>

<div class="mb-3">

    <label>
        <i class="fas fa-wallet"></i>
        Valor Total
    </label>

    <div class="input-group">

        <span class="input-group-text">MZN</span>

        <input type="number"
               step="0.01"
               class="form-control"
               th:field="*{valorTotal}"
               placeholder="0.00"
               required>

    </div>

</div>

<div class="mb-3">

    <label>
        <i class="fas fa-credit-card"></i>
        Método de Pagamento
    </label>

    <input type="text"
           class="form-control"
           th:field="*{metodoPagamento}"
           placeholder="Ex: Dinheiro, M-Pesa, E-Mola, Transferência"
           required>

</div>

<div class="mb-3">

    <label>
        <i class="fas fa-check-circle"></i>
        Status
    </label>

    <select class="form-control"
            th:field="*{status}">

        <option value="">Selecione...</option>

        <option value="PAGO">PAGO</option>

        <option value="PENDENTE">PENDENTE</option>

        <option value="PARCIAL">PARCIAL</option>

    </select>

</div>

<button type="submit"
        class="btn btn-success w-100">

    <i class="fas fa-save"></i>
    Guardar Recibo

</button>

<a th:href="@{/recibos}"
   class="btn btn-secondary w-100 mt-3">

    <i class="fas fa-arrow-left"></i>
    Cancelar e Voltar

</a>

</form>

<div class="footer">

    <i class="fas fa-hotel"></i>

    Sistema de Gestão Hoteleira • Hotel dos Engenheiros de Quelimane 

</div>

</div>

</body>
</html>
